name: CICD Tests
# on: push
on: [repository_dispatch, workflow_dispatch]
jobs:
  tests_run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - '3.11'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          apt install -y adduser base-files bash bash-completion command-not-found cron debconf distro-info-data e2fsprogs fuse3 gettext-base git hdparm keyutils libattr1:amd64 libaudit-common libbrotli1:amd64 libbsd0:amd64 libc-bin libc6:amd64 libfontconfig1:amd64 libfreetype6:amd64 libmagic1:amd64 libmd0:amd64 libmecab2:amd64 libpam-runtime libpcre2-8-0:amd64 libpng16-16:amd64 libpython3.11-minimal:amd64 libpython3.11-stdlib:amd64 libsensors-config libtcl8.6:amd64 libtirpc-common libtk8.6:amd64 libx11-6:amd64 libxau6:amd64 libxcb1:amd64 libxdmcp6:amd64 libxext6:amd64 libxft2:amd64 libxrender1:amd64 libxss1:amd64 locales login logrotate lsb-release ltrace mailcap man-db media-types multipath-tools nano ncurses-base netbase nftables openssl overlayroot procps python3-tk:amd64 python3-zope.interface python3.11-minimal rsyslog screen sudo tar tk8.6-blt2.5 tzdata ucf unixodbc-common usb-modeswitch walinuxagent wget
      - run: |
          python -m pip install --upgrade pip
      - run: |
          pip install tox
      - run: |
          tox -e py3.11
          tox -e safety
    env:
      COLUMNS: '254'
      LC_CTYPE: C.UTF-8
      LINES: '62'
      PYTHONHASHSEED: '3129897882'
      PYTHONIOENCODING: utf-8
      TERM: xterm
